<svg width="300" height="100" viewBox="0 0 300 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d0d;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle for icon -->
  <circle cx="30" cy="50" r="28" fill="url(#bgGradient)" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Central brain/neural node -->
  <circle cx="30" cy="45" r="10" fill="#ffffff" opacity="0.9"/>
  <circle cx="30" cy="45" r="7" fill="#1a1a1a" opacity="0.6"/>

  <!-- Top neural nodes -->
  <circle cx="15" cy="28" r="4.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="45" cy="28" r="4.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="30" cy="18" r="4.5" fill="#ffffff" opacity="0.9"/>

  <!-- Middle side nodes -->
  <circle cx="8" cy="50" r="4.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="52" cy="50" r="4.5" fill="#ffffff" opacity="0.8"/>

  <!-- Bottom neural nodes -->
  <circle cx="15" cy="68" r="4.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="45" cy="68" r="4.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="30" cy="78" r="4.5" fill="#ffffff" opacity="0.9"/>

  <!-- Connection lines (neural pathways) -->
  <!-- From center to top -->
  <line x1="30" y1="45" x2="15" y2="28" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="30" y1="45" x2="45" y2="28" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="30" y1="45" x2="30" y2="18" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>

  <!-- From center to sides -->
  <line x1="30" y1="45" x2="8" y2="50" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="30" y1="45" x2="52" y2="50" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>

  <!-- From center to bottom -->
  <line x1="30" y1="45" x2="15" y2="68" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="30" y1="45" x2="45" y2="68" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>
  <line x1="30" y1="45" x2="30" y2="78" stroke="#ffffff" stroke-width="1.2" opacity="0.7"/>

  <!-- Additional interconnections -->
  <line x1="15" y1="28" x2="8" y2="50" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="45" y1="28" x2="52" y2="50" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="8" y1="50" x2="15" y2="68" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>
  <line x1="52" y1="50" x2="45" y2="68" stroke="#ffffff" stroke-width="0.8" opacity="0.4"/>

  <!-- Outer circuit ring -->
  <circle cx="30" cy="50" r="22" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.3"/>

  <!-- Text: Path-360 -->
  <text x="75" y="60" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ffffff">
    Path-360
  </text>
</svg>